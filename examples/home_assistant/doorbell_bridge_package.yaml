# Pacote de exemplo para Home Assistant.
# Nesta instalacao, o trigger real da campainha eh o evento da entidade abaixo.
# camera.campainha_inteligente serve apenas para preview da camera.

rest_command:
  painel_doorbell_trigger:
    url: "http://host.docker.internal:8000/integrations/doorbell/trigger"
    method: POST
    content_type: "application/json"
    payload: >
      {"duration_seconds": {{ duration_seconds | default(8) }}, "source": "home_assistant"}
    timeout: 10

  painel_doorbell_clear:
    url: "http://host.docker.internal:8000/integrations/doorbell/state"
    method: DELETE
    timeout: 10

automation:
  - id: server_widget_painel_doorbell_bridge
    alias: Campainha Smart Life -> Painel LED
    description: Dispara alerta temporario no painel quando a campainha toca.
    mode: restart
    trigger:
      # Gatilho real da campainha nesta instalacao.
      - platform: state
        entity_id: event.campainha_inteligente_doorbell_picture
        to: "triggered"

      # Gatilho de teste via webhook (sem depender da entidade da campainha).
      # Teste com:
      # curl -X POST "http://127.0.0.1:8123/api/webhook/server_widget_doorbell_test"
      - platform: webhook
        webhook_id: server_widget_doorbell_test

    action:
      - service: rest_command.painel_doorbell_trigger
        data:
          duration_seconds: 8

      # Opcional: limpeza explicita apos o mesmo TTL.
      # O backend ja expira automaticamente, mas isto garante encerramento.
      - delay: "00:00:08"
      - service: rest_command.painel_doorbell_clear
